name: haritailesi-dev

# Sadece infrastructure servisleri — apps local'de çalışır
# Kullanım: docker compose -f infra/docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: haritailesi-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: haritailesi
      POSTGRES_USER: haritailesi
      POSTGRES_PASSWORD: "2562803,Seco."
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U haritailesi']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: haritailesi-redis-dev
    restart: unless-stopped
    command: "redis-server --appendonly yes --requirepass 2562803,Seco."
    volumes:
      - redis-dev-data:/data
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    container_name: haritailesi-minio-dev
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: haritailesi
      MINIO_ROOT_PASSWORD: "2562803,Seco."
    volumes:
      - minio-dev-data:/data
    ports:
      - '9000:9000'
      - '9001:9001'

volumes:
  postgres-dev-data:
  redis-dev-data:
  minio-dev-data:
