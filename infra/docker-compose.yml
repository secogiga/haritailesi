name: haritailesi

services:
  # ─── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: haritailesi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-haritailesi}
      POSTGRES_USER: ${POSTGRES_USER:-haritailesi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-haritailesi}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: haritailesi-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis-data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '--pass', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: haritailesi-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio-data:/data
    ports:
      - '9000:9000'
      - '9001:9001'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── Applications ─────────────────────────────────────────────────────────────

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: haritailesi-api
    restart: unless-stopped
    env_file: ../.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-haritailesi}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-haritailesi}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CORS_ORIGINS: ${CORS_ORIGINS:-https://haritailesi.org,https://sahne.haritailesi.org,https://mutfak.haritailesi.org,https://admin.haritailesi.org}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-.haritailesi.org}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/v1/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: haritailesi-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.haritailesi.org}
    ports:
      - '3001:3001'
    depends_on:
      - api

  sahne:
    build:
      context: ../apps/sahne
      dockerfile: Dockerfile
    container_name: haritailesi-sahne
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.haritailesi.org}
      NEXT_PUBLIC_WEB_URL: ${NEXT_PUBLIC_WEB_URL:-https://haritailesi.org}
      NEXT_PUBLIC_MUTFAK_URL: ${NEXT_PUBLIC_MUTFAK_URL:-https://mutfak.haritailesi.org}
    ports:
      - '3002:3002'
    depends_on:
      - api

  mutfak:
    build:
      context: ../apps/mutfak
      dockerfile: Dockerfile
    container_name: haritailesi-mutfak
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.haritailesi.org}
    ports:
      - '3003:3003'
    depends_on:
      - api

  admin:
    build:
      context: ../apps/admin
      dockerfile: Dockerfile
    container_name: haritailesi-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.haritailesi.org}
    ports:
      - '3004:3004'
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
  minio-data:
